name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7

      - name: Prepare HuaweiConfig (placeholder for CI)
        run: cp docs/HuaweiConfig.example.kt app/src/main/java/com/headdown/healthbridge/huawei/HuaweiConfig.kt

      - name: Run tests
        run: gradle test
